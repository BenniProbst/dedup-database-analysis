      - install-k8s-debian.tar.gz
      - install-k8s-ubuntu.tar.gz
    expire_in: 30 days
    when: always

# ============================================================
# Stage 5: Upload to MinIO (buildsystem-artifacts + buildsystem-deps)
# ============================================================
upload-to-minio:
  stage: upload
  image: python:3.12-alpine
  tags:
    - kubernetes
  script:
    - echo "=== COMDARE CI v6.2.0 — MinIO Upload (artifacts + deps) ==="
    - echo "RBMM Hierarchy — {project}/{platform}/{arch}/{runner_class}/{pipeline_id}/"
    - |
      python3 << 'PYEOF'
      import hashlib, hmac, datetime, os, sys, urllib.request, urllib.parse, urllib.error, ssl, glob

      ctx = ssl.create_default_context()
      ctx.check_hostname = False
      ctx.verify_mode = ssl.CERT_NONE

      def get_signing_key(secret, datestamp, region, service):
          k = hmac.new(('AWS4' + secret).encode(), datestamp.encode(), hashlib.sha256).digest()
          k = hmac.new(k, region.encode(), hashlib.sha256).digest()
          k = hmac.new(k, service.encode(), hashlib.sha256).digest()
          return hmac.new(k, b'aws4_request', hashlib.sha256).digest()

      def s3_put(filepath, bucket, obj_key, endpoint, access, secret):
          with open(filepath, 'rb') as f:
              payload = f.read()
          parsed = urllib.parse.urlparse(endpoint)
          host = parsed.netloc
          scheme = parsed.scheme
          t = datetime.datetime.utcnow()
          amz_date = t.strftime('%Y%m%dT%H%M%SZ')
          ds = t.strftime('%Y%m%d')
          region, service = 'us-east-1', 's3'
          uri = '/' + bucket + '/' + obj_key
          payload_hash = hashlib.sha256(payload).hexdigest()
          headers_str = f'host:{host}\nx-amz-content-sha256:{payload_hash}\nx-amz-date:{amz_date}\n'
          signed_h = 'host;x-amz-content-sha256;x-amz-date'
          creq = f'PUT\n{uri}\n\n{headers_str}\n{signed_h}\n{payload_hash}'
          scope = f'{ds}/{region}/{service}/aws4_request'
          sts = f'AWS4-HMAC-SHA256\n{amz_date}\n{scope}\n{hashlib.sha256(creq.encode()).hexdigest()}'
          sig = hmac.new(get_signing_key(secret, ds, region, service), sts.encode(), hashlib.sha256).hexdigest()
          auth = f'AWS4-HMAC-SHA256 Credential={access}/{scope}, SignedHeaders={signed_h}, Signature={sig}'
          url = f'{scheme}://{host}{uri}'
          req = urllib.request.Request(url, data=payload, method='PUT')
          req.add_header('Authorization', auth)
          req.add_header('x-amz-date', amz_date)
          req.add_header('x-amz-content-sha256', payload_hash)
          req.add_header('Content-Type', 'application/octet-stream')
          try:
              resp = urllib.request.urlopen(req, context=ctx, timeout=60)
              return resp.status
          except urllib.error.HTTPError as e:
              print(f'  HTTP {e.code}: {e.read().decode()[:100]}', file=sys.stderr)
              return e.code

      endpoint = os.environ.get('MINIO_ENDPOINT', '')
      access = os.environ.get('MINIO_ACCESS_KEY', '')
      secret = os.environ.get('MINIO_SECRET_KEY', '')
      proj = os.environ.get('CI_PROJECT_PATH', '')
      pid = os.environ.get('CI_PIPELINE_ID', '')

      # === Part 1: buildsystem-artifacts (coverage + binaries, versioned by pipeline) ===
      bucket_artifacts = 'buildsystem-artifacts'
      uploads = [
          ('coverage-k8s-debian.xml', f'{proj}/linux/x86_64/k8s-debian/{pid}/coverage/coverage-k8s-debian.xml'),
          ('coverage-k8s-ubuntu.xml', f'{proj}/linux/x86_64/k8s-ubuntu/{pid}/coverage/coverage-k8s-ubuntu.xml'),
          ('coverage-debian.xml', f'{proj}/linux/x86_64/debian/{pid}/coverage/coverage-debian.xml'),
          ('coverage-ubuntu.xml', f'{proj}/linux/x86_64/ubuntu/{pid}/coverage/coverage-ubuntu.xml'),
          ('coverage-bm-docker-ubuntu.xml', f'{proj}/linux/x86_64/bm-docker-ubuntu/{pid}/coverage/coverage-bm-docker-ubuntu.xml'),
          ('coverage-bm-docker-debian.xml', f'{proj}/linux/x86_64/bm-docker-debian/{pid}/coverage/coverage-bm-docker-debian.xml'),
      ]
      for build_dir, platform in [('build-k8s-debian', 'k8s-debian'), ('build-k8s-ubuntu', 'k8s-ubuntu'), ('build-debian', 'debian'), ('build-ubuntu', 'ubuntu'), ('build-bm-docker-ubuntu', 'bm-docker-ubuntu'), ('build-bm-docker-debian', 'bm-docker-debian')]:
          for ext in ['*.a', '*.so', '*.dylib']:
              for f in glob.glob(f'{build_dir}/**/{ext}', recursive=True):
                  if not os.path.isfile(f): continue
                  fname = os.path.basename(f)
                  uploads.append((f, f'{proj}/linux/x86_64/{platform}/{pid}/lib/{fname}'))
          for f in glob.glob(f'{build_dir}/**/test_*', recursive=True):
              if os.path.isfile(f) and os.access(f, os.X_OK):
                  fname = os.path.basename(f)
                  uploads.append((f, f'{proj}/linux/x86_64/{platform}/{pid}/bin/{fname}'))

      ok = 0
      for local, key in uploads:
          if os.path.exists(local):
              code = s3_put(local, bucket_artifacts, key, endpoint, access, secret)
              status = 'OK' if code == 200 else f'FAIL({code})'
              print(f'  {status} {bucket_artifacts}/{key}')
              if code == 200: ok += 1
          else:
              print(f'  SKIP {local} (not found)')
      print(f'\nArtifacts upload: {ok}/{len(uploads)} files')

      # === Part 2: buildsystem-deps (install tree for downstream, "latest" key) ===
      bucket_deps = os.environ.get('BEP_DEPS_BUCKET', 'buildsystem-deps')
      module_name = proj.split('/')[-1] if '/' in proj else proj
      for tarball, label in [('install-k8s-debian.tar.gz', 'debian'), ('install-k8s-ubuntu.tar.gz', 'ubuntu')]:
          if os.path.exists(tarball):
              deps_key = f'{module_name}/latest/linux-x86_64-{label}/install.tar.gz'
              code = s3_put(tarball, bucket_deps, deps_key, endpoint, access, secret)
              status = 'OK' if code == 200 else f'FAIL({code})'
              print(f'\n  {status} {bucket_deps}/{deps_key}')
              versioned_key = f'{module_name}/{pid}/linux-x86_64-{label}/install.tar.gz'
              code2 = s3_put(tarball, bucket_deps, versioned_key, endpoint, access, secret)
              status2 = 'OK' if code2 == 200 else f'FAIL({code2})'
              print(f'  {status2} {bucket_deps}/{versioned_key}')
      if not any(os.path.exists(t) for t in ['install-k8s-debian.tar.gz', 'install-k8s-ubuntu.tar.gz']):
          print(f'\nNo install tree — header-only module (deps managed via FetchContent)')

      print(f'\nUpload complete for pipeline {pid}')
      PYEOF
  allow_failure: true
  rules:
    - if: '$MINIO_ENDPOINT && $MINIO_ACCESS_KEY && $MINIO_SECRET_KEY'
      when: always
    - when: never
