    - '[ -f coverage-k8s-debian.xml ] && echo "  K8s Debian (x86_64):         OK" || echo "  K8s Debian (x86_64):         MISSING"'
    - '[ -f coverage-k8s-ubuntu.xml ] && echo "  K8s Ubuntu (x86_64):         OK" || echo "  K8s Ubuntu (x86_64):         MISSING"'
    - '[ -f coverage-debian.xml ] && echo "  BM Debian native (x86_64):   OK" || echo "  BM Debian native (x86_64):   MISSING"'
    - '[ -f coverage-ubuntu.xml ] && echo "  BM Ubuntu native (x86_64):   OK" || echo "  BM Ubuntu native (x86_64):   MISSING"'
    - '[ -f coverage-bm-docker-ubuntu.xml ] && echo "  BM Docker Ubuntu (x86_64):   OK" || echo "  BM Docker Ubuntu (x86_64):   MISSING"'
    - '[ -f coverage-bm-docker-debian.xml ] && echo "  BM Docker Debian (x86_64):   OK" || echo "  BM Docker Debian (x86_64):   MISSING"'
    - '[ -f install-k8s-debian.tar.gz ] && echo "  Install tree (Debian): $(du -sh install-k8s-debian.tar.gz | cut -f1)" || echo "  Install tree (Debian): none"'
    - '[ -f install-k8s-ubuntu.tar.gz ] && echo "  Install tree (Ubuntu): $(du -sh install-k8s-ubuntu.tar.gz | cut -f1)" || echo "  Install tree (Ubuntu): none"'
