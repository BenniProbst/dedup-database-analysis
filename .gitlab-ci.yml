# COMDARE Multi-Platform CI/CD Template v6.2.0 (BS-3040, S2665)
# v6.2.0: BM Docker Cross-OS Builds (User-Direktive S2665)
#   - NEW: build-bm-docker-ubuntu (Docker ubuntu:24.04 on pve1/pve2 Debian BM) — MANDATORY
#   - NEW: build-bm-docker-debian (Docker gcc:14 on node3/node4 Ubuntu BM) — MANDATORY
#   - Docker containers prefer BM runners for performance (same physical machine as K8s)
#   - 6 mandatory jobs: K8s-Debian, K8s-Ubuntu, BM-Debian, BM-Ubuntu, BM-Docker-Ubuntu, BM-Docker-Debian
#   - 4 exotic allow_failure jobs: macOS x86/ARM, Linux ARM64, Linux RISC-V
#   - Total: 12 jobs per pipeline (6 mandatory + 4 exotic + aggregate + upload)
# v6.2.0: Add libssl-dev to K8s Docker builds (OpenSSL for encryption/licensing modules)
# v6.2.0: Exotic FetchContent Auth + GitHub→GitLab mirror rewrites
# v6.1.2: BM FetchContent Auth + mirrors/benchmark CI skip
# v6.1.1: GitHub→GitLab FetchContent URL Rewrites (mirrors for github.com deps)
# v6.1.0: Multi-OS Docker Build Matrix (K8s Debian + K8s Ubuntu, User-Direktive S2660b)
#   - build-k8s split into build-k8s-debian (gcc:14) + build-k8s-ubuntu (ubuntu:24.04)
# v6.0.3: BM jobs mandatory (Debian+Ubuntu+K8s ALL must pass, User-Direktive S2660)
# v6.0.3: Layer-aware dependency resolution + cmake install + artifact sharing
#   - Download upstream module artifacts from MinIO (buildsystem-deps bucket)
#   - cmake --install + upload install tree for downstream consumers
#   - BEP_MODULE_DEPS variable: space-separated list of upstream module names
#   - Configurable CXX_STANDARD (default 23), set by project or staged-build.py
#   - Backward compatible: skip deps/install if not configured
# v5.6.2: GITLAB_DEPLOY_TOKEN for cross-project FetchContent
# v5.6.1: BM artifacts reduced + isfile check for binary upload
# v5.5.0: Sequential stages for RAM stability + XOR enforcement
#   - K8s and BM in SEPARATE stages (never on same host simultaneously)
#   - Max 4 K8s jobs (AntiAffinity), max 2 Debian + 2 Ubuntu BM, max 4 Exotic
#   - concurrent=1 on ALL runners
# v5.4.1: upload-to-minio uses python3 S3v4 (no external mc download needed)
#
# === Runner Architecture (12 runners, 12 jobs per pipeline) ===
# Sequential: K8s -> BM (native+docker) -> Exotic (XOR enforced by stage ordering)
#
# Pool 1: K8s Docker  (pve1/pve2/node3/node4 Talos VMs, AntiAffinity, max 4)
# Pool 2: BM Debian   (pve1+pve2, concurrent=1 each) — native + docker ubuntu:24.04
# Pool 3: BM Ubuntu   (node3+node4, concurrent=1 each) — native + docker gcc:14
# Pool 4: Exotic      (node5/6/7/8, concurrent=1 each, allow_failure)
#
# Docker on BM is preferred over K8s (same physical hosts, no VM overhead)
# XOR: K8s stage finishes BEFORE BM stage starts -> no resource conflict
#
# === Dependency Resolution (v6.0) ===
# staged-build.py passes BEP_MODULE_DEPS when triggering pipelines.
# Before cmake configure, each dep's install tarball is downloaded from
# MinIO buildsystem-deps bucket and extracted to BEP_DEPS_DIR.
# CMAKE_PREFIX_PATH is set to include all deps.
# After successful build, cmake --install uploads the install tree.

stages:
  - build-k8s
  - build-bm
  - build-exotic
  - aggregate
  - upload

variables:
  GCC_VERSION: "14"
  BUILD_TYPE: "Debug"
  CXX_STANDARD: "23"
  # Dependency management (set by staged-build.py or project .gitlab-ci.yml)
  BEP_MODULE_DEPS: ""
  BEP_DEPS_BUCKET: "buildsystem-deps"
  BEP_DEPS_DIR: "/tmp/comdare-deps"
  BEP_INSTALL_PREFIX: "${CI_PROJECT_DIR}/install"
  # Layer metadata (set by staged-build.py)
  BEP_LAYER: ""

# ============================================================
# Stage 1: K8s Docker Builds (2 jobs parallel: Debian + Ubuntu)
# ============================================================

# --- K8s shared dependency download (YAML anchor) ---
.k8s-deps-download: &k8s-deps-download |
  if [ -n "$BEP_MODULE_DEPS" ] && [ -n "$MINIO_ENDPOINT" ] && [ -n "$MINIO_ACCESS_KEY" ]; then
    echo "=== Downloading ${BEP_MODULE_DEPS} from MinIO ==="
    mkdir -p "$BEP_DEPS_DIR"
    python3 << 'DEPSEOF'
  import hashlib, hmac, datetime, os, sys, urllib.request, urllib.parse, urllib.error, tarfile, io, ssl
  ctx = ssl.create_default_context()
  ctx.check_hostname = False
  ctx.verify_mode = ssl.CERT_NONE

  def get_signing_key(secret, datestamp, region, service):
      k = hmac.new(('AWS4' + secret).encode(), datestamp.encode(), hashlib.sha256).digest()
      k = hmac.new(k, region.encode(), hashlib.sha256).digest()
      k = hmac.new(k, service.encode(), hashlib.sha256).digest()
      return hmac.new(k, b'aws4_request', hashlib.sha256).digest()

  def s3_get(bucket, obj_key, endpoint, access, secret):
      parsed = urllib.parse.urlparse(endpoint)
      host, scheme = parsed.netloc, parsed.scheme
      t = datetime.datetime.utcnow()
      amz_date, ds = t.strftime('%Y%m%dT%H%M%SZ'), t.strftime('%Y%m%d')
      region, service = 'us-east-1', 's3'
      uri = '/' + bucket + '/' + obj_key
      payload_hash = hashlib.sha256(b'').hexdigest()
      headers_str = f'host:{host}\nx-amz-content-sha256:{payload_hash}\nx-amz-date:{amz_date}\n'
      signed_h = 'host;x-amz-content-sha256;x-amz-date'
      creq = f'GET\n{uri}\n\n{headers_str}\n{signed_h}\n{payload_hash}'
      scope = f'{ds}/{region}/{service}/aws4_request'
      sts = f'AWS4-HMAC-SHA256\n{amz_date}\n{scope}\n{hashlib.sha256(creq.encode()).hexdigest()}'
      sig = hmac.new(get_signing_key(secret, ds, region, service), sts.encode(), hashlib.sha256).hexdigest()
      auth = f'AWS4-HMAC-SHA256 Credential={access}/{scope}, SignedHeaders={signed_h}, Signature={sig}'
      url = f'{scheme}://{host}{uri}'
      req = urllib.request.Request(url, method='GET')
      req.add_header('Authorization', auth)
      req.add_header('x-amz-date', amz_date)
      req.add_header('x-amz-content-sha256', payload_hash)
      try:
          resp = urllib.request.urlopen(req, context=ctx, timeout=60)
          return resp.read()
      except urllib.error.HTTPError as e:
          return None

  endpoint = os.environ.get('MINIO_ENDPOINT', '')
  access = os.environ.get('MINIO_ACCESS_KEY', '')
  secret = os.environ.get('MINIO_SECRET_KEY', '')
  deps_dir = os.environ.get('BEP_DEPS_DIR', '/tmp/comdare-deps')
  deps_bucket = os.environ.get('BEP_DEPS_BUCKET', 'buildsystem-deps')
  deps_list = os.environ.get('BEP_MODULE_DEPS', '').split()

  ok = 0
  for mod in deps_list:
      obj_key = f'{mod}/latest/linux-x86_64/install.tar.gz'
      data = s3_get(deps_bucket, obj_key, endpoint, access, secret)
      if data:
          dest = os.path.join(deps_dir, mod)
          os.makedirs(dest, exist_ok=True)
          with tarfile.open(fileobj=io.BytesIO(data), mode='r:gz') as tar:
              tar.extractall(dest)
          print(f'  [OK] {mod} -> {dest}')
          ok += 1
      else:
          print(f'  [SKIP] {mod} (not in {deps_bucket})')
  print(f'Downloaded {ok}/{len(deps_list)} dependencies')
  DEPSEOF
    export CMAKE_PREFIX_PATH="$BEP_DEPS_DIR:${CMAKE_PREFIX_PATH:-}"
  else
    echo "No upstream deps configured (BEP_MODULE_DEPS empty or MinIO not set)"
  fi

# --- K8s Job 1: Debian (gcc:14, Debian bookworm) — MANDATORY ---
build-k8s-debian:
  stage: build-k8s
  timeout: 15 minutes
  image: gcc:${GCC_VERSION}
  tags:
    - kubernetes
  before_script:
    - '(while true; do sleep 25; echo "[keepalive $(date -u +%H:%M:%S)]"; done) &'
    - KEEPALIVE_PID=$!
    - apt-get update -qq && apt-get install -y -qq cmake ninja-build git python3-pip libssl-dev >/dev/null 2>&1
    - 'pip install gcovr --break-system-packages -q --retries 3 || echo "WARN: gcovr install failed — coverage will be skipped"'
    - 'FETCH_TOKEN="${GITLAB_DEPLOY_TOKEN:-${CI_JOB_TOKEN}}"'
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/".insteadOf "https://gitlab.comdare.de/"
    # v6.1.1: GitHub → Internal GitLab mirror rewrites (K8s pods cannot reach github.com)
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/mirrors/googletest".insteadOf "https://github.com/google/googletest"
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/mirrors/nlohmann-json".insteadOf "https://github.com/nlohmann/json"
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/mirrors/openxlsx".insteadOf "https://github.com/troldal/OpenXLSX"
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/mirrors/benchmark".insteadOf "https://github.com/google/benchmark"
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/comdare/research/archive/BigInteger".insteadOf "https://github.com/BenniProbst/BigInteger"
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/comdare/products/cd-buildsystem-construct/layer2-abstraction/cd-buildsystem-logging".insteadOf "https://github.com/BenniProbst/cd-buildsystem-logging"
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/comdare/products/cd-buildsystem-construct/layer3-orchestration/cd-buildsystem-sitl".insteadOf "https://github.com/BenniProbst/cd-buildsystem-sitl"
    - *k8s-deps-download
  script:
    - echo "=== COMDARE CI v6.2.0 — K8s Debian (gcc:${GCC_VERSION}, x86_64, C++${CXX_STANDARD}) ==="
    - '[ -n "$BEP_LAYER" ] && echo "Layer: $BEP_LAYER" || true'
    - test -f CMakeLists.txt || { echo "No CMakeLists.txt — skipping"; kill $KEEPALIVE_PID 2>/dev/null || true; exit 0; }
    - cmake -B build-k8s-debian -G Ninja -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage -std=c++${CXX_STANDARD}" -DCMAKE_C_FLAGS=--coverage -DCMAKE_EXE_LINKER_FLAGS=--coverage -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH:-}" -DCMAKE_INSTALL_PREFIX="${BEP_INSTALL_PREFIX}"
    - cmake --build build-k8s-debian -j $(nproc)
    - cd build-k8s-debian && ctest --output-on-failure -j$(nproc) || true
    - cd $CI_PROJECT_DIR
    - kill $KEEPALIVE_PID 2>/dev/null || true
    - sleep 1
    - gcovr --root . --filter 'include/' --filter 'src/' --exclude 'build-k8s-debian/_deps' --print-summary --xml coverage-k8s-debian.xml || true
    - |
      cmake --install build-k8s-debian --prefix "${BEP_INSTALL_PREFIX}" 2>/dev/null || true
      if [ -d "${BEP_INSTALL_PREFIX}" ] && [ "$(ls -A ${BEP_INSTALL_PREFIX} 2>/dev/null)" ]; then
        tar czf install-k8s-debian.tar.gz -C "${BEP_INSTALL_PREFIX}" .
        echo "Install tree created: $(du -sh ${BEP_INSTALL_PREFIX} | cut -f1)"
      else
        echo "No install rules — skipping install tree (header-only module, FetchContent handles deps)"
      fi
  coverage: '/lines:\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage-k8s-debian.xml
      - build-k8s-debian/
      - install-k8s-debian.tar.gz
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage-k8s-debian.xml
    expire_in: 30 days
    when: always

# --- K8s Job 2: Ubuntu 24.04 (gcc-14 installed) — MANDATORY ---
build-k8s-ubuntu:
  stage: build-k8s
  timeout: 15 minutes
  image: ubuntu:24.04
  tags:
    - kubernetes
  before_script:
    - '(while true; do sleep 25; echo "[keepalive $(date -u +%H:%M:%S)]"; done) &'
    - KEEPALIVE_PID=$!
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update -qq && apt-get install -y -qq gcc-14 g++-14 cmake ninja-build git python3-pip libssl-dev >/dev/null 2>&1
    - update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 --slave /usr/bin/g++ g++ /usr/bin/g++-14
    - 'pip install gcovr --break-system-packages -q --retries 3 || echo "WARN: gcovr install failed — coverage will be skipped"'
    - 'FETCH_TOKEN="${GITLAB_DEPLOY_TOKEN:-${CI_JOB_TOKEN}}"'
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/".insteadOf "https://gitlab.comdare.de/"
    # v6.1.1: GitHub → Internal GitLab mirror rewrites (K8s pods cannot reach github.com)
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/mirrors/googletest".insteadOf "https://github.com/google/googletest"
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/mirrors/nlohmann-json".insteadOf "https://github.com/nlohmann/json"
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/mirrors/openxlsx".insteadOf "https://github.com/troldal/OpenXLSX"
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/mirrors/benchmark".insteadOf "https://github.com/google/benchmark"
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/comdare/research/archive/BigInteger".insteadOf "https://github.com/BenniProbst/BigInteger"
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/comdare/products/cd-buildsystem-construct/layer2-abstraction/cd-buildsystem-logging".insteadOf "https://github.com/BenniProbst/cd-buildsystem-logging"
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/comdare/products/cd-buildsystem-construct/layer3-orchestration/cd-buildsystem-sitl".insteadOf "https://github.com/BenniProbst/cd-buildsystem-sitl"
    - *k8s-deps-download
  script:
    - echo "=== COMDARE CI v6.2.0 — K8s Ubuntu 24.04 (gcc-14, x86_64, C++${CXX_STANDARD}) ==="
    - '[ -n "$BEP_LAYER" ] && echo "Layer: $BEP_LAYER" || true'
    - test -f CMakeLists.txt || { echo "No CMakeLists.txt — skipping"; kill $KEEPALIVE_PID 2>/dev/null || true; exit 0; }
    - cmake -B build-k8s-ubuntu -G Ninja -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage -std=c++${CXX_STANDARD}" -DCMAKE_C_FLAGS=--coverage -DCMAKE_EXE_LINKER_FLAGS=--coverage -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH:-}" -DCMAKE_INSTALL_PREFIX="${BEP_INSTALL_PREFIX}"
    - cmake --build build-k8s-ubuntu -j $(nproc)
    - cd build-k8s-ubuntu && ctest --output-on-failure -j$(nproc) || true
    - cd $CI_PROJECT_DIR
    - kill $KEEPALIVE_PID 2>/dev/null || true
    - sleep 1
    - gcovr --root . --filter 'include/' --filter 'src/' --exclude 'build-k8s-ubuntu/_deps' --print-summary --xml coverage-k8s-ubuntu.xml || true
    - |
      cmake --install build-k8s-ubuntu --prefix "${BEP_INSTALL_PREFIX}" 2>/dev/null || true
      if [ -d "${BEP_INSTALL_PREFIX}" ] && [ "$(ls -A ${BEP_INSTALL_PREFIX} 2>/dev/null)" ]; then
        tar czf install-k8s-ubuntu.tar.gz -C "${BEP_INSTALL_PREFIX}" .
        echo "Install tree created: $(du -sh ${BEP_INSTALL_PREFIX} | cut -f1)"
      else
        echo "No install rules — skipping install tree (header-only module, FetchContent handles deps)"
      fi
  coverage: '/lines:\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage-k8s-ubuntu.xml
      - build-k8s-ubuntu/
      - install-k8s-ubuntu.tar.gz
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage-k8s-ubuntu.xml
    expire_in: 30 days
    when: always

# ============================================================
# Stage 2: Bare-Metal Builds (after K8s finishes -> XOR enforced)
# ============================================================

# --- Pool 2: Debian x86_64 (pve1, pve2) — MANDATORY (v6.0.3: User-Direktive S2660) ---
build-debian-x86:
  stage: build-bm
  dependencies: []
  tags:
    - debian
    - x86_64
  before_script:
    - 'echo "=== COMDARE CI v6.2.0 — Debian x86_64 ($(uname -m), C++${CXX_STANDARD}) ==="'
    - 'command -v git >/dev/null || { echo "ERROR: git not found. Run BS-3049 bootstrap."; exit 1; }'
    - 'command -v cmake >/dev/null || { echo "ERROR: cmake not found. Run BS-3049 bootstrap."; exit 1; }'
    - 'command -v gcc >/dev/null || { echo "ERROR: gcc not found. Run BS-3049 bootstrap."; exit 1; }'
    - 'echo "Toolchain: gcc $(gcc -dumpversion 2>/dev/null), cmake $(cmake --version 2>/dev/null | head -1)"'
    # v6.2.0: FetchContent auth + GitHub→GitLab mirror rewrites for BM runners
    - 'FETCH_TOKEN="${GITLAB_DEPLOY_TOKEN:-${CI_JOB_TOKEN}}"'
    - git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/".insteadOf "https://gitlab.comdare.de/"
    - git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/mirrors/googletest".insteadOf "https://github.com/google/googletest"
    - git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/mirrors/nlohmann-json".insteadOf "https://github.com/nlohmann/json"
    - git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/mirrors/openxlsx".insteadOf "https://github.com/troldal/OpenXLSX"
    - git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/mirrors/benchmark".insteadOf "https://github.com/google/benchmark"
    - git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/comdare/research/archive/BigInteger".insteadOf "https://github.com/BenniProbst/BigInteger"
    - git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/comdare/products/cd-buildsystem-construct/layer2-abstraction/cd-buildsystem-logging".insteadOf "https://github.com/BenniProbst/cd-buildsystem-logging"
    - git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/comdare/products/cd-buildsystem-construct/layer3-orchestration/cd-buildsystem-sitl".insteadOf "https://github.com/BenniProbst/cd-buildsystem-sitl"
    # v6.0: Dependency download (BM runners have persistent deps cache)
    - |
      if [ -n "$BEP_MODULE_DEPS" ] && [ -n "$MINIO_ENDPOINT" ] && [ -n "$MINIO_ACCESS_KEY" ]; then
        echo "=== Downloading ${BEP_MODULE_DEPS} ==="
        mkdir -p "$BEP_DEPS_DIR"
        for mod in $BEP_MODULE_DEPS; do
          if command -v python3 >/dev/null; then
            python3 -c "
      import urllib.request, ssl, os, tarfile, io
      ctx = ssl.create_default_context()
      ctx.check_hostname = False
      ctx.verify_mode = ssl.CERT_NONE
      url = os.environ['MINIO_ENDPOINT'] + '/${BEP_DEPS_BUCKET}/${mod}/latest/linux-x86_64/install.tar.gz'
      try:
          data = urllib.request.urlopen(url, context=ctx, timeout=30).read()
          dest = os.path.join(os.environ.get('BEP_DEPS_DIR', '/tmp/comdare-deps'), '${mod}')
          os.makedirs(dest, exist_ok=True)
          tarfile.open(fileobj=io.BytesIO(data), mode='r:gz').extractall(dest)
          print(f'  [OK] ${mod}')
      except Exception as e:
          print(f'  [SKIP] ${mod} ({e})')
      " || true
          fi
        done
        export CMAKE_PREFIX_PATH="$BEP_DEPS_DIR:${CMAKE_PREFIX_PATH:-}"
      fi
  script:
    - test -f CMakeLists.txt || { echo "No CMakeLists.txt — skipping"; exit 0; }
    - cmake -B build-debian -G Ninja -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage -std=c++${CXX_STANDARD}" -DCMAKE_C_FLAGS=--coverage -DCMAKE_EXE_LINKER_FLAGS=--coverage -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH:-}" -DCMAKE_INSTALL_PREFIX="${BEP_INSTALL_PREFIX}"
    - cmake --build build-debian -j $(nproc)
    - cd build-debian && ctest --output-on-failure -j$(nproc) || true
    - cd $CI_PROJECT_DIR
    - 'command -v gcovr >/dev/null && gcovr --root . --filter include/ --filter src/ --exclude build-debian/_deps --print-summary --xml coverage-debian.xml || echo "gcovr not found — skipping coverage"'
    - cmake --install build-debian --prefix "${BEP_INSTALL_PREFIX}" 2>/dev/null || true
  coverage: '/lines:\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage-debian.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage-debian.xml
    expire_in: 30 days
    when: always

# --- Pool 3: Ubuntu x86_64 (node3, node4) — MANDATORY (v6.0.3: User-Direktive S2660) ---
