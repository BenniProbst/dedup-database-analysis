# COMDARE Multi-Platform CI/CD Template v6.0.2 (BS-3040, S2660)
# v6.0.2: BM jobs mandatory (Debian+Ubuntu+K8s ALL must pass, User-Direktive S2660)
# v6.0.2: Layer-aware dependency resolution + cmake install + artifact sharing
#   - Download upstream module artifacts from MinIO (buildsystem-deps bucket)
#   - cmake --install + upload install tree for downstream consumers
#   - BEP_MODULE_DEPS variable: space-separated list of upstream module names
#   - Configurable CXX_STANDARD (default 23), set by project or staged-build.py
#   - Backward compatible: skip deps/install if not configured
# v5.6.2: GITLAB_DEPLOY_TOKEN for cross-project FetchContent
# v5.6.1: BM artifacts reduced + isfile check for binary upload
# v5.5.0: Sequential stages for RAM stability + XOR enforcement
#   - K8s and BM in SEPARATE stages (never on same host simultaneously)
#   - Max 4 K8s jobs (AntiAffinity), max 2 Debian + 2 Ubuntu BM, max 4 Exotic
#   - concurrent=1 on ALL runners
# v5.4.1: upload-to-minio uses python3 S3v4 (no external mc download needed)
#
# === Runner Architecture (12 total) ===
# Sequential: K8s -> BM -> Exotic (XOR enforced by stage ordering)
#
# Pool 1: K8s Docker (pve1/pve2/node3/node4 Talos VMs, AntiAffinity, max 4)
# Pool 2: BM Debian  (pve1+pve2, concurrent=1 each)
# Pool 3: BM Ubuntu  (node3+node4, concurrent=1 each)
# Pool 4: Exotic     (node5/6/7/8, concurrent=1 each, allow_failure)
#
# XOR: K8s stage finishes BEFORE BM stage starts -> no resource conflict
#
# === Dependency Resolution (v6.0) ===
# staged-build.py passes BEP_MODULE_DEPS when triggering pipelines.
# Before cmake configure, each dep's install tarball is downloaded from
# MinIO buildsystem-deps bucket and extracted to BEP_DEPS_DIR.
# CMAKE_PREFIX_PATH is set to include all deps.
# After successful build, cmake --install uploads the install tree.

stages:
  - build-k8s
  - build-bm
  - build-exotic
  - aggregate
  - upload

variables:
  GCC_VERSION: "14"
  BUILD_TYPE: "Debug"
  CXX_STANDARD: "23"
  # Dependency management (set by staged-build.py or project .gitlab-ci.yml)
  BEP_MODULE_DEPS: ""
  BEP_DEPS_BUCKET: "buildsystem-deps"
  BEP_DEPS_DIR: "/tmp/comdare-deps"
  BEP_INSTALL_PREFIX: "${CI_PROJECT_DIR}/install"
  # Layer metadata (set by staged-build.py)
  BEP_LAYER: ""

# ============================================================
# Stage 1: K8s Build (Docker executor, max 4 pods via AntiAffinity)
# ============================================================
build-k8s:
  stage: build-k8s
  timeout: 15 minutes
  image: gcc:${GCC_VERSION}
  tags:
    - kubernetes
  before_script:
    - '(while true; do sleep 25; echo "[keepalive $(date -u +%H:%M:%S)]"; done) &'
    - KEEPALIVE_PID=$!
    - apt-get update -qq && apt-get install -y -qq cmake ninja-build git python3-pip >/dev/null 2>&1
    - 'pip install gcovr --break-system-packages -q --retries 3 || echo "WARN: gcovr install failed — coverage will be skipped"'
    - 'FETCH_TOKEN="${GITLAB_DEPLOY_TOKEN:-${CI_JOB_TOKEN}}"'
    - git config --global url."http://oauth2:${FETCH_TOKEN}@gitlab-webservice-default.gitlab.svc:8181/".insteadOf "https://gitlab.comdare.de/"
    # v6.0: Download upstream dependencies from MinIO
    - |
      if [ -n "$BEP_MODULE_DEPS" ] && [ -n "$MINIO_ENDPOINT" ] && [ -n "$MINIO_ACCESS_KEY" ]; then
        echo "=== Downloading ${BEP_MODULE_DEPS} from MinIO ==="
        mkdir -p "$BEP_DEPS_DIR"
        python3 << 'DEPSEOF'
      import hashlib, hmac, datetime, os, sys, urllib.request, urllib.parse, urllib.error, tarfile, io, ssl
      ctx = ssl.create_default_context()
      ctx.check_hostname = False
      ctx.verify_mode = ssl.CERT_NONE

      def get_signing_key(secret, datestamp, region, service):
          k = hmac.new(('AWS4' + secret).encode(), datestamp.encode(), hashlib.sha256).digest()
          k = hmac.new(k, region.encode(), hashlib.sha256).digest()
          k = hmac.new(k, service.encode(), hashlib.sha256).digest()
          return hmac.new(k, b'aws4_request', hashlib.sha256).digest()

      def s3_get(bucket, obj_key, endpoint, access, secret):
          parsed = urllib.parse.urlparse(endpoint)
          host, scheme = parsed.netloc, parsed.scheme
          t = datetime.datetime.utcnow()
          amz_date, ds = t.strftime('%Y%m%dT%H%M%SZ'), t.strftime('%Y%m%d')
          region, service = 'us-east-1', 's3'
          uri = '/' + bucket + '/' + obj_key
          payload_hash = hashlib.sha256(b'').hexdigest()
          headers_str = f'host:{host}\nx-amz-content-sha256:{payload_hash}\nx-amz-date:{amz_date}\n'
          signed_h = 'host;x-amz-content-sha256;x-amz-date'
          creq = f'GET\n{uri}\n\n{headers_str}\n{signed_h}\n{payload_hash}'
          scope = f'{ds}/{region}/{service}/aws4_request'
          sts = f'AWS4-HMAC-SHA256\n{amz_date}\n{scope}\n{hashlib.sha256(creq.encode()).hexdigest()}'
          sig = hmac.new(get_signing_key(secret, ds, region, service), sts.encode(), hashlib.sha256).hexdigest()
          auth = f'AWS4-HMAC-SHA256 Credential={access}/{scope}, SignedHeaders={signed_h}, Signature={sig}'
          url = f'{scheme}://{host}{uri}'
          req = urllib.request.Request(url, method='GET')
          req.add_header('Authorization', auth)
          req.add_header('x-amz-date', amz_date)
          req.add_header('x-amz-content-sha256', payload_hash)
          try:
              resp = urllib.request.urlopen(req, context=ctx, timeout=60)
              return resp.read()
          except urllib.error.HTTPError as e:
              return None

      endpoint = os.environ.get('MINIO_ENDPOINT', '')
      access = os.environ.get('MINIO_ACCESS_KEY', '')
      secret = os.environ.get('MINIO_SECRET_KEY', '')
      deps_dir = os.environ.get('BEP_DEPS_DIR', '/tmp/comdare-deps')
      deps_bucket = os.environ.get('BEP_DEPS_BUCKET', 'buildsystem-deps')
      deps_list = os.environ.get('BEP_MODULE_DEPS', '').split()

      ok = 0
      for mod in deps_list:
          obj_key = f'{mod}/latest/linux-x86_64/install.tar.gz'
          data = s3_get(deps_bucket, obj_key, endpoint, access, secret)
          if data:
              dest = os.path.join(deps_dir, mod)
              os.makedirs(dest, exist_ok=True)
              with tarfile.open(fileobj=io.BytesIO(data), mode='r:gz') as tar:
                  tar.extractall(dest)
              print(f'  [OK] {mod} -> {dest}')
              ok += 1
          else:
              print(f'  [SKIP] {mod} (not in {deps_bucket})')
      print(f'Downloaded {ok}/{len(deps_list)} dependencies')
      DEPSEOF
        export CMAKE_PREFIX_PATH="$BEP_DEPS_DIR:${CMAKE_PREFIX_PATH:-}"
      else
        echo "No upstream deps configured (BEP_MODULE_DEPS empty or MinIO not set)"
      fi
  script:
    - echo "=== COMDARE CI v6.0.2 — K8s (gcc:${GCC_VERSION}, x86_64, C++${CXX_STANDARD}) ==="
    - '[ -n "$BEP_LAYER" ] && echo "Layer: $BEP_LAYER" || true'
    - test -f CMakeLists.txt || { echo "No CMakeLists.txt — skipping"; kill $KEEPALIVE_PID 2>/dev/null || true; exit 0; }
    - cmake -B build-k8s -G Ninja -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage -std=c++${CXX_STANDARD}" -DCMAKE_C_FLAGS=--coverage -DCMAKE_EXE_LINKER_FLAGS=--coverage -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH:-}" -DCMAKE_INSTALL_PREFIX="${BEP_INSTALL_PREFIX}"
    - cmake --build build-k8s -j $(nproc)
    - cd build-k8s && ctest --output-on-failure -j$(nproc) || true
    - cd $CI_PROJECT_DIR
    - kill $KEEPALIVE_PID 2>/dev/null || true
    - sleep 1
    - gcovr --root . --filter 'include/' --filter 'src/' --exclude 'build-k8s/_deps' --print-summary --xml coverage-k8s.xml || true
    # v6.0: Install and create tarball for downstream consumers
    - |
      cmake --install build-k8s --prefix "${BEP_INSTALL_PREFIX}" 2>/dev/null || true
      if [ -d "${BEP_INSTALL_PREFIX}" ] && [ "$(ls -A ${BEP_INSTALL_PREFIX} 2>/dev/null)" ]; then
        tar czf install-k8s.tar.gz -C "${BEP_INSTALL_PREFIX}" .
        echo "Install tree created: $(du -sh ${BEP_INSTALL_PREFIX} | cut -f1)"
      else
        echo "No install rules — skipping install tree (header-only module, FetchContent handles deps)"
      fi
  coverage: '/lines:\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage-k8s.xml
      - build-k8s/
      - install-k8s.tar.gz
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage-k8s.xml
    expire_in: 30 days
    when: always

# ============================================================
# Stage 2: Bare-Metal Builds (after K8s finishes -> XOR enforced)
# ============================================================

# --- Pool 2: Debian x86_64 (pve1, pve2) — MANDATORY (v6.0.2: User-Direktive S2660) ---
build-debian-x86:
  stage: build-bm
  dependencies: []
  tags:
    - debian
    - x86_64
  before_script:
    - 'echo "=== COMDARE CI v6.0.2 — Debian x86_64 ($(uname -m), C++${CXX_STANDARD}) ==="'
    - 'command -v git >/dev/null || { echo "ERROR: git not found. Run BS-3049 bootstrap."; exit 1; }'
    - 'command -v cmake >/dev/null || { echo "ERROR: cmake not found. Run BS-3049 bootstrap."; exit 1; }'
    - 'command -v gcc >/dev/null || { echo "ERROR: gcc not found. Run BS-3049 bootstrap."; exit 1; }'
    - 'echo "Toolchain: gcc $(gcc -dumpversion 2>/dev/null), cmake $(cmake --version 2>/dev/null | head -1)"'
    # v6.0: Dependency download (BM runners have persistent deps cache)
    - |
      if [ -n "$BEP_MODULE_DEPS" ] && [ -n "$MINIO_ENDPOINT" ] && [ -n "$MINIO_ACCESS_KEY" ]; then
        echo "=== Downloading ${BEP_MODULE_DEPS} ==="
        mkdir -p "$BEP_DEPS_DIR"
        for mod in $BEP_MODULE_DEPS; do
          if command -v python3 >/dev/null; then
            python3 -c "
import urllib.request, ssl, os, tarfile, io
ctx = ssl.create_default_context()
ctx.check_hostname = False
ctx.verify_mode = ssl.CERT_NONE
url = os.environ['MINIO_ENDPOINT'] + '/${BEP_DEPS_BUCKET}/${mod}/latest/linux-x86_64/install.tar.gz'
try:
    data = urllib.request.urlopen(url, context=ctx, timeout=30).read()
    dest = os.path.join(os.environ.get('BEP_DEPS_DIR', '/tmp/comdare-deps'), '${mod}')
    os.makedirs(dest, exist_ok=True)
    tarfile.open(fileobj=io.BytesIO(data), mode='r:gz').extractall(dest)
    print(f'  [OK] ${mod}')
except Exception as e:
    print(f'  [SKIP] ${mod} ({e})')
" || true
          fi
        done
        export CMAKE_PREFIX_PATH="$BEP_DEPS_DIR:${CMAKE_PREFIX_PATH:-}"
      fi
  script:
    - test -f CMakeLists.txt || { echo "No CMakeLists.txt — skipping"; exit 0; }
    - cmake -B build-debian -G Ninja -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage -std=c++${CXX_STANDARD}" -DCMAKE_C_FLAGS=--coverage -DCMAKE_EXE_LINKER_FLAGS=--coverage -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH:-}" -DCMAKE_INSTALL_PREFIX="${BEP_INSTALL_PREFIX}"
    - cmake --build build-debian -j $(nproc)
    - cd build-debian && ctest --output-on-failure -j$(nproc) || true
    - cd $CI_PROJECT_DIR
    - 'command -v gcovr >/dev/null && gcovr --root . --filter include/ --filter src/ --exclude build-debian/_deps --print-summary --xml coverage-debian.xml || echo "gcovr not found — skipping coverage"'
    - cmake --install build-debian --prefix "${BEP_INSTALL_PREFIX}" 2>/dev/null || true
  coverage: '/lines:\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage-debian.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage-debian.xml
    expire_in: 30 days
    when: always

# --- Pool 3: Ubuntu x86_64 (node3, node4) — MANDATORY (v6.0.2: User-Direktive S2660) ---
build-ubuntu-x86:
  stage: build-bm
  dependencies: []
  tags:
    - ubuntu
    - x86_64
  before_script:
    - 'echo "=== COMDARE CI v6.0.2 — Ubuntu x86_64 ($(uname -m), C++${CXX_STANDARD}) ==="'
    - 'command -v git >/dev/null || { echo "ERROR: git not found. Run BS-3049 bootstrap."; exit 1; }'
    - 'command -v cmake >/dev/null || { echo "ERROR: cmake not found. Run BS-3049 bootstrap."; exit 1; }'
    - 'command -v gcc >/dev/null || { echo "ERROR: gcc not found. Run BS-3049 bootstrap."; exit 1; }'
    - 'echo "Toolchain: gcc $(gcc -dumpversion 2>/dev/null), cmake $(cmake --version 2>/dev/null | head -1)"'
    # v6.0: Dependency download
    - |
      if [ -n "$BEP_MODULE_DEPS" ] && [ -n "$MINIO_ENDPOINT" ] && [ -n "$MINIO_ACCESS_KEY" ]; then
        echo "=== Downloading ${BEP_MODULE_DEPS} ==="
        mkdir -p "$BEP_DEPS_DIR"
        for mod in $BEP_MODULE_DEPS; do
          if command -v python3 >/dev/null; then
            python3 -c "
import urllib.request, ssl, os, tarfile, io
ctx = ssl.create_default_context()
ctx.check_hostname = False
ctx.verify_mode = ssl.CERT_NONE
url = os.environ['MINIO_ENDPOINT'] + '/${BEP_DEPS_BUCKET}/${mod}/latest/linux-x86_64/install.tar.gz'
try:
    data = urllib.request.urlopen(url, context=ctx, timeout=30).read()
    dest = os.path.join(os.environ.get('BEP_DEPS_DIR', '/tmp/comdare-deps'), '${mod}')
    os.makedirs(dest, exist_ok=True)
    tarfile.open(fileobj=io.BytesIO(data), mode='r:gz').extractall(dest)
    print(f'  [OK] ${mod}')
except Exception as e:
    print(f'  [SKIP] ${mod} ({e})')
" || true
          fi
        done
        export CMAKE_PREFIX_PATH="$BEP_DEPS_DIR:${CMAKE_PREFIX_PATH:-}"
      fi
  script:
    - test -f CMakeLists.txt || { echo "No CMakeLists.txt — skipping"; exit 0; }
    - cmake -B build-ubuntu -G Ninja -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage -std=c++${CXX_STANDARD}" -DCMAKE_C_FLAGS=--coverage -DCMAKE_EXE_LINKER_FLAGS=--coverage -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH:-}" -DCMAKE_INSTALL_PREFIX="${BEP_INSTALL_PREFIX}"
    - cmake --build build-ubuntu -j $(nproc)
    - cd build-ubuntu && ctest --output-on-failure -j$(nproc) || true
    - cd $CI_PROJECT_DIR
    - 'command -v gcovr >/dev/null && gcovr --root . --filter include/ --filter src/ --exclude build-ubuntu/_deps --print-summary --xml coverage-ubuntu.xml || echo "gcovr not found — skipping coverage"'
    - cmake --install build-ubuntu --prefix "${BEP_INSTALL_PREFIX}" 2>/dev/null || true
  coverage: '/lines:\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage-ubuntu.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage-ubuntu.xml
    expire_in: 30 days
    when: always

# ============================================================
# Stage 3: Exotic Platforms (after BM finishes, SOFT-FAIL)
# ============================================================
.exotic-base:
  stage: build-exotic
  dependencies: []
  allow_failure: true
  before_script:
    - 'echo "=== COMDARE CI v6.0.2 — Exotic ($(uname -s) $(uname -m), C++${CXX_STANDARD}) ==="'
    - 'command -v git >/dev/null || { echo "WARN: git not found — skipping"; exit 0; }'
    - 'command -v cmake >/dev/null || { echo "WARN: cmake not found — skipping"; exit 0; }'
  script:
    - test -f CMakeLists.txt || { echo "No CMakeLists.txt — skipping"; exit 0; }
    - 'GEN=""; command -v ninja >/dev/null && GEN="-G Ninja"'
    - cmake -B build-exotic $GEN -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DBUILD_TESTS=ON -DCMAKE_CXX_STANDARD=${CXX_STANDARD}
    - cmake --build build-exotic -j $(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
    - cd build-exotic && ctest --output-on-failure || true
    - cd $CI_PROJECT_DIR
  artifacts:
    expire_in: 30 days
    when: always

# Lane 4: macOS x86_64 (node5)
build-macos-x86:
  extends: .exotic-base
  tags:
    - macos
    - x86_64

# Lane 5: macOS ARM64 (node6)
build-macos-arm:
  extends: .exotic-base
  tags:
    - macos
    - arm64

# Lane 6: Linux ARM64 (node7)
build-linux-arm64:
  extends: .exotic-base
  tags:
    - arm64
    - linux

# Lane 7: Linux RISC-V (node8)
build-linux-riscv:
  extends: .exotic-base
  tags:
    - riscv64
    - linux

# ============================================================
# Stage 4: Aggregate Results
# ============================================================
aggregate-results:
  stage: aggregate
  image: alpine:latest
  tags:
    - kubernetes
  rules:
    - when: always
  script:
    - echo "=== COMDARE CI v6.0.2 — Aggregate Results ==="
    - '[ -n "$BEP_LAYER" ] && echo "Layer: $BEP_LAYER" || true'
    - '[ -n "$BEP_MODULE_DEPS" ] && echo "Deps: $BEP_MODULE_DEPS" || true'
    - echo "Platform build results:"
    - '[ -f coverage-k8s.xml ] && echo "  K8s Docker (x86_64):  OK" || echo "  K8s Docker (x86_64):  MISSING"'
    - '[ -f coverage-debian.xml ] && echo "  Debian BM (x86_64):   OK" || echo "  Debian BM (x86_64):   MISSING"'
    - '[ -f coverage-ubuntu.xml ] && echo "  Ubuntu BM (x86_64):   OK" || echo "  Ubuntu BM (x86_64):   MISSING"'
    - '[ -f install-k8s.tar.gz ] && echo "  Install tree:          $(du -sh install-k8s.tar.gz | cut -f1)" || echo "  Install tree:          none (header-only)"'
    - echo "Pipeline $CI_PIPELINE_ID complete on $(date -u)"
  artifacts:
    paths:
      - coverage-k8s.xml
      - coverage-debian.xml
      - coverage-ubuntu.xml
      - install-k8s.tar.gz
    expire_in: 30 days
    when: always

# ============================================================
# Stage 5: Upload to MinIO (buildsystem-artifacts + buildsystem-deps)
# ============================================================
upload-to-minio:
  stage: upload
  image: python:3.12-alpine
  tags:
    - kubernetes
  script:
    - echo "=== COMDARE CI v6.0.2 — MinIO Upload (artifacts + deps) ==="
    - echo "RBMM Hierarchy — {project}/{platform}/{arch}/{runner_class}/{pipeline_id}/"
    - |
      python3 << 'PYEOF'
      import hashlib, hmac, datetime, os, sys, urllib.request, urllib.parse, urllib.error, ssl, glob

      ctx = ssl.create_default_context()
      ctx.check_hostname = False
      ctx.verify_mode = ssl.CERT_NONE

      def get_signing_key(secret, datestamp, region, service):
          k = hmac.new(('AWS4' + secret).encode(), datestamp.encode(), hashlib.sha256).digest()
          k = hmac.new(k, region.encode(), hashlib.sha256).digest()
          k = hmac.new(k, service.encode(), hashlib.sha256).digest()
          return hmac.new(k, b'aws4_request', hashlib.sha256).digest()

      def s3_put(filepath, bucket, obj_key, endpoint, access, secret):
          with open(filepath, 'rb') as f:
              payload = f.read()
          parsed = urllib.parse.urlparse(endpoint)
          host = parsed.netloc
          scheme = parsed.scheme
          t = datetime.datetime.utcnow()
          amz_date = t.strftime('%Y%m%dT%H%M%SZ')
          ds = t.strftime('%Y%m%d')
          region, service = 'us-east-1', 's3'
          uri = '/' + bucket + '/' + obj_key
          payload_hash = hashlib.sha256(payload).hexdigest()
          headers_str = f'host:{host}\nx-amz-content-sha256:{payload_hash}\nx-amz-date:{amz_date}\n'
          signed_h = 'host;x-amz-content-sha256;x-amz-date'
          creq = f'PUT\n{uri}\n\n{headers_str}\n{signed_h}\n{payload_hash}'
          scope = f'{ds}/{region}/{service}/aws4_request'
          sts = f'AWS4-HMAC-SHA256\n{amz_date}\n{scope}\n{hashlib.sha256(creq.encode()).hexdigest()}'
          sig = hmac.new(get_signing_key(secret, ds, region, service), sts.encode(), hashlib.sha256).hexdigest()
          auth = f'AWS4-HMAC-SHA256 Credential={access}/{scope}, SignedHeaders={signed_h}, Signature={sig}'
          url = f'{scheme}://{host}{uri}'
          req = urllib.request.Request(url, data=payload, method='PUT')
          req.add_header('Authorization', auth)
          req.add_header('x-amz-date', amz_date)
          req.add_header('x-amz-content-sha256', payload_hash)
          req.add_header('Content-Type', 'application/octet-stream')
          try:
              resp = urllib.request.urlopen(req, context=ctx, timeout=60)
              return resp.status
          except urllib.error.HTTPError as e:
              print(f'  HTTP {e.code}: {e.read().decode()[:100]}', file=sys.stderr)
              return e.code

      endpoint = os.environ.get('MINIO_ENDPOINT', '')
      access = os.environ.get('MINIO_ACCESS_KEY', '')
      secret = os.environ.get('MINIO_SECRET_KEY', '')
      proj = os.environ.get('CI_PROJECT_PATH', '')
      pid = os.environ.get('CI_PIPELINE_ID', '')

      # === Part 1: buildsystem-artifacts (coverage + binaries, versioned by pipeline) ===
      bucket_artifacts = 'buildsystem-artifacts'
      uploads = [
          ('coverage-k8s.xml', f'{proj}/linux/x86_64/k8s/{pid}/coverage/coverage-k8s.xml'),
          ('coverage-debian.xml', f'{proj}/linux/x86_64/debian/{pid}/coverage/coverage-debian.xml'),
          ('coverage-ubuntu.xml', f'{proj}/linux/x86_64/ubuntu/{pid}/coverage/coverage-ubuntu.xml'),
      ]
      for build_dir, platform in [('build-k8s', 'k8s'), ('build-debian', 'debian'), ('build-ubuntu', 'ubuntu')]:
          for ext in ['*.a', '*.so', '*.dylib']:
              for f in glob.glob(f'{build_dir}/**/{ext}', recursive=True):
                  if not os.path.isfile(f): continue
                  fname = os.path.basename(f)
                  uploads.append((f, f'{proj}/linux/x86_64/{platform}/{pid}/lib/{fname}'))
          for f in glob.glob(f'{build_dir}/**/test_*', recursive=True):
              if os.path.isfile(f) and os.access(f, os.X_OK):
                  fname = os.path.basename(f)
                  uploads.append((f, f'{proj}/linux/x86_64/{platform}/{pid}/bin/{fname}'))

      ok = 0
      for local, key in uploads:
          if os.path.exists(local):
              code = s3_put(local, bucket_artifacts, key, endpoint, access, secret)
              status = 'OK' if code == 200 else f'FAIL({code})'
              print(f'  {status} {bucket_artifacts}/{key}')
              if code == 200: ok += 1
          else:
              print(f'  SKIP {local} (not found)')
      print(f'\nArtifacts upload: {ok}/{len(uploads)} files')

      # === Part 2: buildsystem-deps (install tree for downstream, "latest" key) ===
      bucket_deps = os.environ.get('BEP_DEPS_BUCKET', 'buildsystem-deps')
      install_tarball = 'install-k8s.tar.gz'
      if os.path.exists(install_tarball):
          # Extract module name from project path (last component)
          module_name = proj.split('/')[-1] if '/' in proj else proj
          deps_key = f'{module_name}/latest/linux-x86_64/install.tar.gz'
          code = s3_put(install_tarball, bucket_deps, deps_key, endpoint, access, secret)
          status = 'OK' if code == 200 else f'FAIL({code})'
          print(f'\n  {status} {bucket_deps}/{deps_key}')
          # Also version-tagged
          versioned_key = f'{module_name}/{pid}/linux-x86_64/install.tar.gz'
          code2 = s3_put(install_tarball, bucket_deps, versioned_key, endpoint, access, secret)
          status2 = 'OK' if code2 == 200 else f'FAIL({code2})'
          print(f'  {status2} {bucket_deps}/{versioned_key}')
      else:
          print(f'\nNo install tree — header-only module (deps managed via FetchContent)')

      print(f'\nUpload complete for pipeline {pid}')
      PYEOF
  allow_failure: true
  rules:
    - if: '$MINIO_ENDPOINT && $MINIO_ACCESS_KEY && $MINIO_SECRET_KEY'
      when: always
    - when: never
