    - KEEPALIVE_PID=$!
    - *universal-install
    - *k8s-fetch-setup
    - *k8s-deps-download
  script:
    - echo "=== COMDARE CI v7.0.0 — K8s Ubuntu 24.04 (C++${CXX_STANDARD}) ==="
    - '[ -n "$BEP_LAYER" ] && echo "Layer: $BEP_LAYER" || true'
    - test -f CMakeLists.txt || { echo "No CMakeLists.txt — skipping"; kill $KEEPALIVE_PID 2>/dev/null || true; exit 0; }
    - 'GEN=""; command -v ninja >/dev/null 2>&1 && GEN="-G Ninja"'
    - cmake -B build-k8s-ubuntu $GEN -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage -std=c++${CXX_STANDARD}" -DCMAKE_C_FLAGS=--coverage -DCMAKE_EXE_LINKER_FLAGS=--coverage -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH:-}" -DCMAKE_INSTALL_PREFIX="${BEP_INSTALL_PREFIX}"
    - cmake --build build-k8s-ubuntu -j $(nproc)
    - cd build-k8s-ubuntu && ctest --output-on-failure -j$(nproc) || true
    - cd $CI_PROJECT_DIR
    - kill $KEEPALIVE_PID 2>/dev/null || true
    - sleep 1
    - gcovr --root . --filter 'include/' --filter 'src/' --exclude 'build-k8s-ubuntu/_deps' --print-summary --xml coverage-k8s-ubuntu.xml 2>/dev/null || true
    - |
      cmake --install build-k8s-ubuntu --prefix "${BEP_INSTALL_PREFIX}" 2>/dev/null || true
      if [ -d "${BEP_INSTALL_PREFIX}" ] && [ "$(ls -A ${BEP_INSTALL_PREFIX} 2>/dev/null)" ]; then
        tar czf install-k8s-ubuntu.tar.gz -C "${BEP_INSTALL_PREFIX}" .
        echo "Install tree created: $(du -sh ${BEP_INSTALL_PREFIX} | cut -f1)"
        rm -rf "${BEP_INSTALL_PREFIX}"
      fi
  coverage: '/lines:\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage-k8s-ubuntu.xml
      - install-k8s-ubuntu.tar.gz
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage-k8s-ubuntu.xml
    expire_in: 30 days
    when: always

# ============================================================
# Pool 2: Bare-Metal Native Builds — MANDATORY (Debian + Ubuntu x86_64)
# ============================================================

build-debian-x86:
  stage: build
  dependencies: []
  tags:
    - debian
    - x86_64
  before_script:
    - 'echo "=== COMDARE CI v7.0.0 — BM Debian x86_64 ($(uname -m), C++${CXX_STANDARD}) ==="'
    - 'command -v git >/dev/null || { echo "ERROR: git not found"; exit 1; }'
    - 'command -v cmake >/dev/null || { echo "ERROR: cmake not found"; exit 1; }'
    - 'echo "Toolchain: gcc $(gcc -dumpversion 2>/dev/null), cmake $(cmake --version 2>/dev/null | head -1)"'
    - *bm-fetch-setup
    - |
      if [ -n "$BEP_MODULE_DEPS" ] && [ -n "$MINIO_ENDPOINT" ] && [ -n "$MINIO_ACCESS_KEY" ]; then
        echo "=== Downloading ${BEP_MODULE_DEPS} ==="
        mkdir -p "$BEP_DEPS_DIR"
        for mod in $BEP_MODULE_DEPS; do
          python3 -c "
      import urllib.request, ssl, os, tarfile, io
      ctx = ssl.create_default_context(); ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
      url = os.environ['MINIO_ENDPOINT'] + '/${BEP_DEPS_BUCKET}/${mod}/latest/linux-x86_64/install.tar.gz'
      try:
          data = urllib.request.urlopen(url, context=ctx, timeout=30).read()
          dest = os.path.join(os.environ.get('BEP_DEPS_DIR','/tmp/comdare-deps'), '${mod}')
          os.makedirs(dest, exist_ok=True); tarfile.open(fileobj=io.BytesIO(data), mode='r:gz').extractall(dest)
          print(f'  [OK] ${mod}')
      except Exception as e: print(f'  [SKIP] ${mod} ({e})')
      " || true
        done
        export CMAKE_PREFIX_PATH="$BEP_DEPS_DIR:${CMAKE_PREFIX_PATH:-}"
      fi
  script:
    - test -f CMakeLists.txt || { echo "No CMakeLists.txt — skipping"; exit 0; }
    - cmake -B build-debian -G Ninja -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage -std=c++${CXX_STANDARD}" -DCMAKE_C_FLAGS=--coverage -DCMAKE_EXE_LINKER_FLAGS=--coverage -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH:-}" -DCMAKE_INSTALL_PREFIX="${BEP_INSTALL_PREFIX}"
    - cmake --build build-debian -j $(nproc)
    - cd build-debian && ctest --output-on-failure -j$(nproc) || true
    - cd $CI_PROJECT_DIR
    - 'command -v gcovr >/dev/null && gcovr --root . --filter include/ --filter src/ --exclude build-debian/_deps --print-summary --xml coverage-debian.xml || echo "gcovr not found — skipping coverage"'
    - cmake --install build-debian --prefix "${BEP_INSTALL_PREFIX}" 2>/dev/null || true
  coverage: '/lines:\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage-debian.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage-debian.xml
    expire_in: 30 days
    when: always

build-ubuntu-x86:
  stage: build
  dependencies: []
  tags:
    - ubuntu
    - x86_64
  before_script:
    - 'echo "=== COMDARE CI v7.0.0 — BM Ubuntu x86_64 ($(uname -m), C++${CXX_STANDARD}) ==="'
    - 'command -v git >/dev/null || { echo "ERROR: git not found"; exit 1; }'
    - 'command -v cmake >/dev/null || { echo "ERROR: cmake not found"; exit 1; }'
    - 'echo "Toolchain: gcc $(gcc -dumpversion 2>/dev/null), cmake $(cmake --version 2>/dev/null | head -1)"'
    - *bm-fetch-setup
    - |
      if [ -n "$BEP_MODULE_DEPS" ] && [ -n "$MINIO_ENDPOINT" ] && [ -n "$MINIO_ACCESS_KEY" ]; then
        echo "=== Downloading ${BEP_MODULE_DEPS} ==="
        mkdir -p "$BEP_DEPS_DIR"
        for mod in $BEP_MODULE_DEPS; do
          python3 -c "
      import urllib.request, ssl, os, tarfile, io
      ctx = ssl.create_default_context(); ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
      url = os.environ['MINIO_ENDPOINT'] + '/${BEP_DEPS_BUCKET}/${mod}/latest/linux-x86_64/install.tar.gz'
      try:
          data = urllib.request.urlopen(url, context=ctx, timeout=30).read()
          dest = os.path.join(os.environ.get('BEP_DEPS_DIR','/tmp/comdare-deps'), '${mod}')
          os.makedirs(dest, exist_ok=True); tarfile.open(fileobj=io.BytesIO(data), mode='r:gz').extractall(dest)
          print(f'  [OK] ${mod}')
      except Exception as e: print(f'  [SKIP] ${mod} ({e})')
      " || true
        done
        export CMAKE_PREFIX_PATH="$BEP_DEPS_DIR:${CMAKE_PREFIX_PATH:-}"
      fi
  script:
    - test -f CMakeLists.txt || { echo "No CMakeLists.txt — skipping"; exit 0; }
    - cmake -B build-ubuntu -G Ninja -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage -std=c++${CXX_STANDARD}" -DCMAKE_C_FLAGS=--coverage -DCMAKE_EXE_LINKER_FLAGS=--coverage -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH:-}" -DCMAKE_INSTALL_PREFIX="${BEP_INSTALL_PREFIX}"
    - cmake --build build-ubuntu -j $(nproc)
    - cd build-ubuntu && ctest --output-on-failure -j$(nproc) || true
    - cd $CI_PROJECT_DIR
    - 'command -v gcovr >/dev/null && gcovr --root . --filter include/ --filter src/ --exclude build-ubuntu/_deps --print-summary --xml coverage-ubuntu.xml || echo "gcovr not found — skipping coverage"'
    - cmake --install build-ubuntu --prefix "${BEP_INSTALL_PREFIX}" 2>/dev/null || true
  coverage: '/lines:\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage-ubuntu.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage-ubuntu.xml
    expire_in: 30 days
    when: always

