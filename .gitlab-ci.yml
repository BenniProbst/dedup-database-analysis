# ============================================================
# Pool 3: Exotic Native Builds — allow_failure (macOS, ARM64, RISC-V)
# ============================================================
.exotic-base:
  stage: build
  dependencies: []
  allow_failure: true
  before_script:
    - 'echo "=== COMDARE CI v6.3.0 — Exotic Native ($(uname -s) $(uname -m), C++${CXX_STANDARD}) ==="'
    - 'command -v git >/dev/null || { echo "WARN: git not found — skipping"; exit 0; }'
    - 'command -v cmake >/dev/null || { echo "WARN: cmake not found — skipping"; exit 0; }'
    - *bm-fetch-setup
  script:
    - test -f CMakeLists.txt || { echo "No CMakeLists.txt — skipping"; exit 0; }
    - 'GEN=""; command -v ninja >/dev/null && GEN="-G Ninja"'
    - cmake -B build-exotic $GEN -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DBUILD_TESTS=ON -DCMAKE_CXX_STANDARD=${CXX_STANDARD}
    - cmake --build build-exotic -j $(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
    - cd build-exotic && ctest --output-on-failure || true
    - cd $CI_PROJECT_DIR
  artifacts:
    expire_in: 30 days
    when: always

# Lane: macOS x86_64 (node5)
build-macos-x86:
  extends: .exotic-base
  tags:
    - macos
    - x86_64

# Lane: macOS ARM64 (node6)
build-macos-arm:
  extends: .exotic-base
  tags:
    - macos
    - arm64

# Lane: Linux ARM64 (node7 Pi5)
build-linux-arm64:
  extends: .exotic-base
  tags:
    - arm64
    - linux

# Lane: Linux RISC-V (node8)
build-linux-riscv:
  extends: .exotic-base
  tags:
    - riscv64
    - linux

# ============================================================
# Pool 4: Docker ARM64 Builds — 6 Linux OSes via docker run (allow_failure)
# Runs on node6 (macOS ARM64, colima) or node7 (Pi5 ARM64, Docker CE)
# ============================================================
build-docker-arm64:
  stage: build
  dependencies: []
  allow_failure: true
  timeout: 25 minutes
  parallel:
    matrix:
      - DOCKER_OS: ubuntu
        DOCKER_IMAGE: "ubuntu:24.04"
      - DOCKER_OS: debian
        DOCKER_IMAGE: "debian:12"
      - DOCKER_OS: fedora
        DOCKER_IMAGE: "fedora:41"
      - DOCKER_OS: alpine
        DOCKER_IMAGE: "alpine:3.21"
      - DOCKER_OS: opensuse
        DOCKER_IMAGE: "opensuse/tumbleweed"
      - DOCKER_OS: rocky
        DOCKER_IMAGE: "rockylinux:9"
  tags:
    - arm64
  before_script:
    - 'echo "=== COMDARE CI v6.3.0 — Docker ARM64 ${DOCKER_OS} (C++${CXX_STANDARD}) ==="'
    - 'command -v docker >/dev/null || { echo "WARN: docker not found — skipping"; exit 0; }'
    - 'docker pull ${DOCKER_IMAGE} || { echo "WARN: ${DOCKER_IMAGE} not available for $(uname -m) — skipping"; exit 0; }'
  script:
    - test -f CMakeLists.txt || { echo "No CMakeLists.txt — skipping"; exit 0; }
    - 'FETCH_TOKEN="${GITLAB_DEPLOY_TOKEN:-${CI_JOB_TOKEN}}"'
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR":/workspace \
        -w /workspace \
        -e "DEBIAN_FRONTEND=noninteractive" \
        -e "CXX_STANDARD=${CXX_STANDARD}" \
        -e "BUILD_TYPE=${BUILD_TYPE}" \
        -e "FETCH_TOKEN=${FETCH_TOKEN}" \
        ${DOCKER_IMAGE} sh -c '
          # Universal C++ build dependency installer
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update -qq
            apt-get install -y -qq gcc g++ cmake ninja-build git libssl-dev make >/dev/null 2>&1
            apt-get install -y -qq gcc-14 g++-14 >/dev/null 2>&1 && \
              update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
                --slave /usr/bin/g++ g++ /usr/bin/g++-14 2>/dev/null || true
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y gcc gcc-c++ cmake ninja-build git openssl-devel make >/dev/null 2>&1
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache gcc g++ cmake samurai git musl-dev openssl-dev make >/dev/null 2>&1
          elif command -v zypper >/dev/null 2>&1; then
            zypper --non-interactive install gcc gcc-c++ cmake ninja git libopenssl-devel make >/dev/null 2>&1
          fi
          # FetchContent auth + mirror rewrites
          git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/".insteadOf "https://gitlab.comdare.de/"
          git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/mirrors/googletest".insteadOf "https://github.com/google/googletest"
          git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/mirrors/nlohmann-json".insteadOf "https://github.com/nlohmann/json"
          git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/mirrors/openxlsx".insteadOf "https://github.com/troldal/OpenXLSX"
          git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/mirrors/benchmark".insteadOf "https://github.com/google/benchmark"
          git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/comdare/research/archive/BigInteger".insteadOf "https://github.com/BenniProbst/BigInteger"
          git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/comdare/products/cd-buildsystem-construct/layer2-abstraction/cd-buildsystem-logging".insteadOf "https://github.com/BenniProbst/cd-buildsystem-logging"
          git config --global url."https://oauth2:${FETCH_TOKEN}@gitlab.comdare.de/comdare/products/cd-buildsystem-construct/layer3-orchestration/cd-buildsystem-sitl".insteadOf "https://github.com/BenniProbst/cd-buildsystem-sitl"
          # Build
          GEN=""; command -v ninja >/dev/null 2>&1 && GEN="-G Ninja"
          cmake -B build-docker-arm64-${DOCKER_OS} $GEN \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DBUILD_TESTS=ON \
            -DCMAKE_CXX_STANDARD=${CXX_STANDARD}
          cmake --build build-docker-arm64-${DOCKER_OS} -j $(nproc 2>/dev/null || echo 2)
          cd build-docker-arm64-${DOCKER_OS} && ctest --output-on-failure || true
        '
  artifacts:
    expire_in: 30 days
    when: always

